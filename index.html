<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Perception Study</title>

  <!-- Dev error overlay – catches both sync errors and rejected promises -->
  <script>
    function showError(msg, src) {
      document.body.innerHTML =
        '<div style="padding:24px;font-family:monospace;color:#c0392b;background:#fff">' +
        '<h3>Error (open DevTools Console for details)</h3>' +
        '<p>' + msg + '</p>' +
        (src ? '<p style="font-size:0.85em;color:#888">' + src + '</p>' : '') +
        '</div>';
    }
    window.addEventListener('error', function (e) {
      showError(e.message, e.filename + ':' + e.lineno);
    });
    window.addEventListener('unhandledrejection', function (e) {
      showError('Unhandled promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  </script>

  <!-- jsPsych 7 – use unpkg bare URL (resolves to the correct browser bundle) -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link  rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />

  <!-- Plugins (bare unpkg URLs – same convention as jsPsych docs) -->
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Dark / light mode toggle (top-right, always visible) -->
  <button id="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle theme">
    <span id="theme-icon">☀</span>
  </button>
  <script>
    (function () {
      const btn  = document.getElementById("theme-toggle");
      const icon = document.getElementById("theme-icon");
      const DARK = "dark", LIGHT = "light";
      let current = localStorage.getItem("theme") || DARK;

      function apply(theme) {
        document.body.dataset.theme = theme;
        icon.textContent = theme === DARK ? "☀" : "☾";
        localStorage.setItem("theme", theme);
        current = theme;
      }
      apply(current);
      btn.addEventListener("click", function () {
        apply(current === DARK ? LIGHT : DARK);
      });
    })();
  </script>

  <script src="experiment.js"></script>
</body>
</html>
